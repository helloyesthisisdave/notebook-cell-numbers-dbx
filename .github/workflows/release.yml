name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Set version from tag
        run: npm version "${{ github.ref_name }}" --no-git-tag-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ github.ref_name }}"
          git push origin HEAD:refs/heads/main

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx vsce package

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -(alpha|beta|rc) ]]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to VS Marketplace
        if: steps.prerelease.outputs.value == 'false'
        run: npx vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.prerelease.outputs.value == 'false'
        run: npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          prerelease: ${{ steps.prerelease.outputs.value }}
