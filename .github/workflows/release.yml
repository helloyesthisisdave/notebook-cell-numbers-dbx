name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx vsce package

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
